spring.application.name=weekly-report-backend

# =========================
# DATABASE CONFIG (XAMPP MySQL / MariaDB)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/weekly_report_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT FIX (prevents MySQL 5.x warning issues)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# BEST PRACTICE (fix lazy loading warning)
spring.jpa.open-in-view=false

# =========================
# SERVER CONFIG
# =========================
server.port=8080

# =========================
# JWT CONFIG
# =========================
jwt.secret=ThisIsMySecretKeyForJWTGenerationMakeItLongAndRandom123456789
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# =========================
# LOGGING (OPTIONAL BUT VERY USEFUL)
# =========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE